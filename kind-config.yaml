# Kind Cluster Configuration for MuchTodo
# This configuration creates a Kind cluster optimized for the MuchTodo application

kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4

name: muchtodo

# Nodes configuration
nodes:
  # Control plane node
  - role: control-plane
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
    extraPortMappings:
      # Port mapping for NodePort service (30080)
      - containerPort: 30080
        hostPort: 30080
        protocol: TCP
      # Port mapping for Ingress HTTP
      - containerPort: 80
        hostPort: 80
        protocol: TCP
      # Port mapping for Ingress HTTPS
      - containerPort: 443
        hostPort: 443
        protocol: TCP

# Networking configuration
networking:
  # Default API server port
  apiServerPort: 6443
  # Pod subnet
  podSubnet: "10.244.0.0/16"
  # Service subnet
  serviceSubnet: "10.96.0.0/12"
